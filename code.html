  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f3f0e7;
      --panel: #ffffff;
      --accent: #7cc9a6;
      --text: #2f2f2f;
      --shadow: rgba(0,0,0,0.08);
    }

    body {
      margin: 0;
      font-family: 'Press Start 2P', monospace;
      background: linear-gradient(180deg, #f7f3ea, #e9f5ef);
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 40px 20px 20px;
    }

    header h1 {
      font-size: 18px;
      color: var(--accent);
    }

    nav {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      padding: 10px;
    }

    nav a {
      text-decoration: none;
      color: var(--text);
      border: 2px solid var(--accent);
      padding: 8px;
      font-size: 9px;
      border-radius: 10px;
      background: #fff;
      box-shadow: 2px 2px 0 var(--shadow);
    }

    nav a:hover {
      background: var(--accent);
      color: white;
    }

    .container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    .message {
      background: var(--panel);
      padding: 30px;
      border-radius: 16px;
      border: 2px solid #e8e3d9;
      box-shadow: 4px 4px 0 var(--shadow);
      font-size: 10px;
      line-height: 2;
      max-width: 500px;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 8px;
      color: #888;
    }
  </style>
</head>
